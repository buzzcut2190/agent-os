<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Terminal window frame -->
  <rect x="8" y="20" width="84" height="80" rx="8" fill="#1e1e2e" stroke="url(#accent)" stroke-width="2"/>
  <!-- Terminal title bar -->
  <circle cx="22" cy="32" r="4" fill="#ff5f57"/>
  <circle cx="34" cy="32" r="4" fill="#febc2e"/>
  <circle cx="46" cy="32" r="4" fill="#28c840"/>
  <!-- Terminal content -->
  <text x="18" y="54" font-family="monospace" font-size="11" fill="#a0a0c0">$</text>
  <text x="30" y="54" font-family="monospace" font-size="11" fill="#c0c0e0">cat @kernel</text>
  <text x="18" y="72" font-family="monospace" font-size="11" fill="#6366f1">agentfs</text>
  <text x="18" y="88" font-family="monospace" font-size="11" fill="#6ee7b7">▶ agent alive</text>

  <!-- Bridging arrow -->
  <path d="M 96 60 L 116 60" stroke="url(#accent)" stroke-width="2.5" stroke-dasharray="4,3"/>
  <polygon points="118,60 112,56 112,64" fill="url(#accent)"/>

  <!-- OS gear icon -->
  <g transform="translate(148, 30)">
    <circle cx="30" cy="30" r="18" fill="none" stroke="url(#accent2)" stroke-width="2.5"/>
    <circle cx="30" cy="30" r="8" fill="none" stroke="url(#accent2)" stroke-width="2.5"/>
    <!-- Gear teeth -->
    <line x1="30" y1="6" x2="30" y2="14" stroke="url(#accent2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="46" x2="30" y2="54" stroke="url(#accent2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="6" y1="30" x2="14" y2="30" stroke="url(#accent2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="46" y1="30" x2="54" y2="30" stroke="url(#accent2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="13" y1="13" x2="19" y2="19" stroke="url(#accent2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="41" y1="41" x2="47" y2="47" stroke="url(#accent2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="13" y1="47" x2="19" y2="41" stroke="url(#accent2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="41" y1="19" x2="47" y2="13" stroke="url(#accent2)" stroke-width="3" stroke-linecap="round"/>
    <!-- Circuit lines -->
    <path d="M 30 48 L 30 70" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="30" cy="72" r="3" fill="url(#accent)" opacity="0.5"/>
    <path d="M 48 30 L 70 30" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="72" cy="30" r="3" fill="url(#accent)" opacity="0.5"/>
    <!-- Mini agent nodes -->
    <circle cx="14" cy="50" r="3" fill="#6ee7b7" opacity="0.7"/>
    <circle cx="46" cy="14" r="3" fill="#6ee7b7" opacity="0.7"/>
  </g>

  <!-- Text -->
  <text x="232" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#e0e0f0" letter-spacing="1">agent-os</text>
  <text x="232" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8080a0" letter-spacing="2" text-transform="uppercase">AGENT-NATIVE OPERATING SYSTEM</text>

  <!-- Status dots -->
  <circle cx="232" cy="100" r="3" fill="#6ee7b7"/>
  <text x="240" y="104" font-family="monospace" font-size="9" fill="#6ee7b7">● agentfs running</text>
  <circle cx="320" cy="100" r="3" fill="#6366f1"/>
  <text x="328" y="104" font-family="monospace" font-size="9" fill="#6366f1">● 33 MCP tools</text>
</svg>
